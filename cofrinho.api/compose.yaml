services:
  cofrinho.api:
    image: cofrinho.api
    networks:
      - backend
    build:
      context: .
      dockerfile: cofrinho.api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DB_CONNECTION=${DB_CONNECTION}
    ports:
      - 8080:80
    
  postgres:
    image: postgres
    container_name: postgres-cofrinho-api   
    networks:
      - backend
    volumes:
      - /home/postgres2:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - 5435:5432    

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq-cofrinho-api
    networks:
      - backend
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - 5672:5672
      - 15672:15672


networks:
  backend:

